       <div class="post-content">
        <p>呜呼幼龄小花，误中毒食夭亡！</p>
<p>前天摇头摆尾，今日天地两方。</p>
<p>再无相随漫步，共谁踏雪寻香？</p>
<p>不见绕膝欢跳，怎再凝眸相望？</p>
<p>尔生不足三月，岂不痛我肝肠？</p>
<p>小魂天若有灵，请享鱼肉蒸尝！</p>
<p>呜呼哀哉！伏维尚飨。</p>
