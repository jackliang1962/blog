<p>呼朋唤友巴蜀行，<br>
雨过日月明。<br>
青城山幽，<br>
盐都古远，<br>
峨眉云海生。</p>
<p>宽窄巷子锦里院，<br>
总是故人情。<br>
小曲轻吟，<br>
遨游似凤，<br>
山水任纵横。</p>

青衫磊落险峰行，
玉璧月华明。
马疾香幽，
崖高人远，
微步觳纹生。

谁家子弟谁家院，
无计悔多情。
