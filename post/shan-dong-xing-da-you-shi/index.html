        <h3><a>山东行打油诗</a></h3>
       </div>
       <div class="post-content">
        <p>山东老二坐济南，招得诸友许尽欢；<br>
亲任主陪频劝酒，三陪四陪把酒端。<br>
师兄畅饮成首醉，老大拒酒不拒烟；<br>
小五凭空谈往事，竟饮茅台八两三。</p>
<p>台儿庄内吊英烈，曲阜三孔拜圣贤；<br>
挥汗泰山玉皇顶；置身云雾任凭栏。<br>
命里有无休着相，世间生灭总无端；<br>
富贵宠辱宜相忘，人生本应如是观。</p>
